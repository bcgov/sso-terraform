name: Check Code/Commit Conventions

on: pull_request

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
    - uses: hmarr/debug-action@cd1afbd7852b7ad7b1b7a9a1b03efebd3b0a1820 #v3
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4

    - name: Get PR
      id: pr
      run: |
        pr=$(curl ${{ github.event.pull_request._links.self.href }})
        labels=$(jq ".labels" <<< "$pr")
        botLabel=$(jq -c '.[] | select(.name | contains("auto_generated")).name' <<< "$labels")
        echo "{count}={$count}" >> $GITHUB_OUTPUT

    - name: Install asdf requirements
      run: |
        sudo apt-get update
        sudo apt-get install -y libssl-dev libreadline-dev uuid-dev

    - name: Setup asdf
      uses: asdf-vm/actions/setup@b7bcd026f18772e44fe1026d729e1611cc435d47 #v4

    - name: Cache tools
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 #v4
      with:
        path: /home/runner/.asdf
        key: ${{ runner.os }}-${{ hashFiles('**/.tool-versions') }}

    - name: Install asdf
      uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 #v4

    - name: Rerun Pre-Commit Hooks on CI
      run: |
        pip install -r requirements.txt
        asdf reshim
        pre-commit run --color=always --show-diff-on-failure --all-files


  commitlint:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4
      with:
        fetch-depth: 0
    - uses: wagoid/commitlint-github-action@9763196e10f27aef304c9b8b660d31d97fce0f99 #v5
