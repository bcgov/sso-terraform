name: Test E2E

on: push

# on:
#   workflow_run:
#     workflows: ["Check code/commit conventions"]
#     types:
#       - completed

jobs:
  pre-commit:
    runs-on: ubuntu-18.04
    env:
      KEYCLOAK_URL: http://127.0.0.1:3000
      KEYCLOAK_USERNAME: admin
      KEYCLOAK_PASSWORD: Pa55w0rd
    steps:
      - uses: actions/checkout@v2

      # NPM PACKAGES
      - name: Get yarn cache directory path
        id: yarn-cache-dir
        run: echo "::set-output name=dir::$(yarn cache dir)"
      - uses: actions/cache@v2
        id: yarn-cache # use this to check for `cache-hit` (`steps.yarn-cache.outputs.cache-hit != 'true'`)
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      - name: Install Yarn dependencies
        run: |
          yarn

      # ASDF TOOLS
      - name: Install asdf
        uses: asdf-vm/actions/setup@v1
      - name: Cache tools
        uses: actions/cache@v2
        with:
          path: |
            /home/runner/.asdf
          key: ${{ runner.os }}-${{ hashFiles('**/.tool-versions') }}
      - name: Install required tools
        run: |
          cat .tool-versions | cut -f 1 -d ' ' | xargs -n 1 asdf plugin-add || true
          asdf plugin-update --all
          asdf install
          asdf reshim
      - name: Run local Keycloak instance
        run: |
          docker-compose -f dockerfiles/keycloak-postgres.yml up -d
          echo $KEYCLOAK_URL
          wait-on $KEYCLOAK_URL
          node scripts/e2e-prep.js
